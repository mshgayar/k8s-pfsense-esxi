apiVersion: metallb.io/v1beta1
kind: IPAddressPool
metadata:
  name: k8s-ip-pool
  namespace: metallb-system
spec:
  addresses:
  - 172.25.25.100-172.25.25.150
---
apiVersion: metallb.io/v1beta1
kind: L2Advertisement
metadata:
  name: k8s-l2-advert
  namespace: metallb-system
spec:
  ipAddressPools:
  - k8s-ip-pool
